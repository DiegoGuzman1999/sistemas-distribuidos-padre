services:

  postgres-main:
    image: postgres:15
    container_name: postgres-main
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventario_db_main
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    networks:
      - red-main
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inventario_db_main"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase-main:
    build: ../sistemas-distribuidos-bd
    container_name: liquibase-main
    depends_on:
      postgres-main:
        condition: service_healthy
    command: >
      --url=jdbc:postgresql://postgres-main:5432/inventario_db_main
      --username=admin
      --password=admin123
      --changeLogFile=changelog-master.xml
      update
    networks:
      - red-main

  backend-autenticacion-main:
    build: ../sistemas-distribuidos-backend-1
    container_name: backend-autenticacion-main
    restart: unless-stopped
    ports:
      - "5020:5000"
    environment:
      SECRET_KEY: clave-main-segura
      DB_HOST: postgres-main
      DB_PORT: 5432
      DB_NAME: inventario_db_main
      DB_USER: admin
      DB_PASSWORD: admin123
    depends_on:
      liquibase-main:
        condition: service_completed_successfully
    networks:
      - red-main

  backend-inventario-main:
    build: ../sistemas-distribuidos-backend-2
    container_name: backend-inventario-main
    restart: unless-stopped
    ports:
      - "5021:5001"
    environment:
      SECRET_KEY: clave-main-segura
      DB_HOST: postgres-main
      DB_PORT: 5432
      DB_NAME: inventario_db_main
      DB_USER: admin
      DB_PASSWORD: admin123
    depends_on:
      liquibase-main:
        condition: service_completed_successfully
    networks:
      - red-main

  frontend-main:
    build: ../sistemas-distribuidos-frontend
    container_name: frontend-main
    restart: unless-stopped
    ports:
      - "3002:80"
    volumes:
      - ./nginx/nginx.main.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-autenticacion-main
      - backend-inventario-main
    networks:
      - red-main

volumes:
  postgres_main_data:

networks:
  red-main:
    driver: bridge
